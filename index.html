<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Masterpiece Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-purple: #bc13fe;
            --bg-color: #050505;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 50% 0%, #1a0b2e 0%, var(--bg-color) 70%);
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            overflow-x: hidden;
        }
        
        .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
        
        /* Hiệu ứng Header Hoành tráng */
        header { text-align: center; margin-bottom: 30px; position: relative; }
        header h1 { 
            font-weight: 900; 
            font-size: 32px; 
            margin: 0 0 5px 0;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
            letter-spacing: 1px;
        }
        header p { color: #8892b0; margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        /* Khung nhập liệu Glassmorphism */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
            padding: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        label { display: block; font-size: 12px; color: var(--neon-blue); text-transform: uppercase; margin-bottom: 10px; font-weight: 600; letter-spacing: 1px; }
        
        input { 
            width: 100%; padding: 18px; border-radius: 16px; 
            border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); 
            color: #fff; font-size: 16px; margin-bottom: 25px; outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
        
        /* Chọn phông nền cho có vẻ "nguy hiểm" */
        .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .style-item { 
            padding: 15px 10px; border-radius: 16px; background: rgba(255,255,255,0.05); 
            text-align: center; font-size: 13px; cursor: pointer; border: 1px solid transparent; 
            transition: 0.3s; color: #aaa; font-weight: 600;
        }
        .style-item.active { 
            border-color: var(--neon-purple); background: rgba(188, 19, 254, 0.1); 
            color: #fff; box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
        }

        /* Nút bấm siêu cấp */
        .btn { 
            width: 100%; padding: 20px; border-radius: 16px; border: none; 
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); 
            color: white; font-weight: 900; font-size: 18px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(188, 19, 254, 0.3);
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.96); }

        /* Khu vực Loading lừa đảo */
        #loading-screen { display: none; text-align: center; margin-top: 40px; }
        .radar { 
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(0,243,255,0.2);
            margin: 0 auto 20px; position: relative; overflow: hidden;
        }
        .radar::before {
            content: ''; position: absolute; top: 0; left: 50%; width: 50%; height: 50%;
            background: linear-gradient(to right, transparent, var(--neon-blue));
            transform-origin: 0% 100%; animation: scan 1.5s linear infinite;
        }
        @keyframes scan { 100% { transform: rotate(360deg); } }
        
        .progress-container { width: 100%; height: 6px; background: #222; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); transition: width 0.3s ease; }
        .loading-text { font-family: monospace; color: var(--neon-blue); margin-top: 15px; font-size: 14px; }

        /* Màn hình kết quả Troll */
        #result-screen { display: none; text-align: center; margin-top: 10px; animation: glitchReveal 0.5s cubic-bezier(0.25, 1.5, 0.5, 1); }
        @keyframes glitchReveal { 0% { transform: scale(0.8) skewX(10deg); opacity: 0; filter: blur(10px); } 100% { transform: scale(1) skewX(0); opacity: 1; filter: blur(0); } }

        .img-box { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            border: 4px solid #ff3e3e; box-shadow: 0 0 30px rgba(255, 62, 62, 0.5);
            background: #111; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
        }
        #troll-img { width: 100%; height: 100%; object-fit: cover; }
        .troll-msg { margin: 20px 0; color: #ff3e3e; font-weight: 900; font-size: 24px; text-transform: uppercase; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>THAN PROART</h1>
        <p>Kiến tạo hình ảnh chân thực</p>
    </header>

    <div class="glass-card" id="input-card">
        <label>1. Nhập văn bản cần vẽ</label>
        <input type="text" id="inp" placeholder="Ví dụ: Hoàng Hôn Trên Biển..." maxlength="40">
        
        <label>2. Lựa chọn siêu cấu trúc</label>
        <div class="style-grid" id="styles">
            <div class="style-item active">Cyberpunk Neon 8K</div>
            <div class="style-item">Gỗ Cổ Điển</div>
            <div class="style-item">Bọt Cà Phê Chân Thực</div>
            <div class="style-item">Điêu Khắc Đá Cẩm Thạch</div>
        </div>

        <button class="btn" onclick="startHack()">TẠO TÁC PHẨM NGAY</button>
    </div>

    <div id="loading-screen">
        <div class="radar"></div>
        <h3 style="margin: 0; color: #fff;">HỆ THỐNG ĐANG XỬ LÝ</h3>
        <div class="loading-text" id="status">Khởi tạo Core AI... [0%]</div>
        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
    </div>

    <div id="result-screen">
        <div class="img-box">
            <img id="troll-img" src="bựa.jpg" alt="Siêu Phẩm">
        </div>
        <p class="troll-msg">Quá ngu, bị t lừa hahaha 🤪</p>
        <button class="btn" style="background: #333; box-shadow: none; margin-top: 10px; font-size: 15px;" onclick="location.reload()">CHƠI LẠI TỪ ĐẦU</button>
    </div>
</div>

<script>
    // Xử lý click chọn phong cách để nạn nhân tin là thật
    const items = document.querySelectorAll('.style-item');
    items.forEach(i => i.onclick = () => {
        items.forEach(s => s.classList.remove('active'));
        i.classList.add('active');
    });

    // Bắt đầu quá trình lừa đảo
    function startHack() {
        const text = document.getElementById('inp').value;
        if(!text) {
            alert("Vui lòng nhập văn bản để AI phân tích!");
            return;
        }

        document.getElementById('input-card').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';

        const statusText = document.getElementById('status');
        const pBar = document.getElementById('p-bar');
        
        let progress = 0;
        
        // Tạo thanh chạy % ngẫu nhiên cho giống đang tải thật
        const fakeLoad = setInterval(() => {
            progress += Math.floor(Math.random() * 15) + 5; // Tăng ngẫu nhiên 5-20%
            
            if(progress > 100) progress = 100;
            
            pBar.style.width = progress + '%';

            // Đổi text theo tiến độ
            if(progress < 30) statusText.innerText = `Đang phân tích ngữ nghĩa... [${progress}%]`;
            else if(progress < 60) statusText.innerText = `Đang áp dụng mô hình ánh sáng... [${progress}%]`;
            else if(progress < 90) statusText.innerText = `Đang kết xuất độ phân giải 8K... [${progress}%]`;
            else statusText.innerText = `Hoàn tất tác phẩm! [100%]`;

            if(progress === 100) {
                clearInterval(fakeLoad);
                setTimeout(showTroll, 800); // Dừng 0.8s ở 100% rồi mới hiện ảnh để tăng độ hồi hộp
            }
        }, 600); // Mỗi 0.6 giây update 1 lần
    }

    function showTroll() {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
